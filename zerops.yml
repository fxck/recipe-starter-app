# Build & run descriptor for the Remix + Postgres starter app. Referenced by the
# recipe-starter-template recipe via buildFromGit.
zerops:
  - setup: app
    build:
      base: nodejs@22
      buildCommands:
        - npm ci
        - npm run build
      deployFiles:
        - build
        - public
        - package.json
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      initCommands:
        - npx prisma migrate deploy
      start: npm run start
